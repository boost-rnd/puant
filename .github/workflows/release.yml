name: Release

on:
  push:
    # run only against tags
    tags:
      - "v*.*.*"

env:
  GO_VERSION: 1.25
  GO_RELEASER_VERSION: v2.4.7
  
permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: false
    - name: Set up cross-compilers for Linux and macOS
      run: |
        # Install Linux cross-compilers
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
        # Install osxcross for macOS cross-compilation
        sudo apt-get install -y clang libxml2-dev
        git clone https://github.com/tpoechtrager/osxcross.git
        cd osxcross
        git checkout 121ce150c7857a9474dfff8a8e431482806b3e1b
        sudo ./tools/get_osxcross.sh
        echo "$(pwd)/target/bin" | sudo tee -a $GITHUB_PATH
        cd ..
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: ${{ env.GO_RELEASER_VERSION }}
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
